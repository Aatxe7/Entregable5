services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${APP_PORT}:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
