name: CI - Test, Build & Push to ACR (no Azure SP)

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  IMAGE_REPO: mi-backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start app (background)
        env:
          DATABASE_URL: postgresql+psycopg://appuser:apppass@localhost:5432/appdb
          APP_PORT: "5000"
        run: |
          nohup python app.py >/tmp/app.log 2>&1 &
          sleep 2
          curl -sS http://localhost:5000/ || (cat /tmp/app.log && exit 1)

      - name: Run tests
        env:
          BASE_URL: http://localhost:5000
        run: pytest -q

  build_push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Login to ACR (Docker)
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build & push (latest + sha)
        env:
          LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t "$LOGIN_SERVER/$IMAGE_REPO:$SHA_TAG" -t "$LOGIN_SERVER/$IMAGE_REPO:latest" .
          docker push "$LOGIN_SERVER/$IMAGE_REPO:$SHA_TAG"
          docker push "$LOGIN_SERVER/$IMAGE_REPO:latest"
