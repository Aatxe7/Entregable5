name: CI/CD - Test, Build, Push to ACR, Deploy to Container Apps

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  RG: rg-entregable5
  ACR_NAME: acrentregable5aatxe7
  IMAGE_REPO: mi-backend
  CONTAINERAPP_NAME: ca-entregable5-backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start app (background)
        env:
          DATABASE_URL: postgresql+psycopg://appuser:apppass@localhost:5432/appdb
          APP_PORT: "5000"
        run: |
          nohup python app.py >/tmp/app.log 2>&1 &
          sleep 2
          curl -sS http://localhost:5000/ || (cat /tmp/app.log && exit 1)

      - name: Run tests
        env:
          BASE_URL: http://localhost:5000
        run: pytest -q

  build_push_deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show -n "$ACR_NAME" --query "loginServer" -o tsv)
          echo "login_server=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image (SHA + latest)
        env:
          LOGIN_SERVER: ${{ steps.acr.outputs.login_server }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t "$LOGIN_SERVER/$IMAGE_REPO:$SHA_TAG" -t "$LOGIN_SERVER/$IMAGE_REPO:latest" .
          docker push "$LOGIN_SERVER/$IMAGE_REPO:$SHA_TAG"
          docker push "$LOGIN_SERVER/$IMAGE_REPO:latest"

      - name: Deploy to Container App (update image)
        env:
          LOGIN_SERVER: ${{ steps.acr.outputs.login_server }}
          SHA_TAG: ${{ github.sha }}
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RG" \
            --image "$LOGIN_SERVER/$IMAGE_REPO:$SHA_TAG"
